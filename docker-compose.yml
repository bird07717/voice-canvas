services:
  postgres:
    image: postgres:15-alpine
    container_name: voice_canvas_postgres
    environment:
      POSTGRES_DB: voice_canvas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d voice_canvas"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    container_name: voice_canvas_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:postgres123@postgres:5432/voice_canvas
      SECRET_KEY: your-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      SVG_ASSET_ROOTS: /svg-assets
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend/public/svg-assets:/svg-assets:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: voice_canvas_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
