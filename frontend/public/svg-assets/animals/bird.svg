<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="12" ry="16" fill="#6BCDFF"/>
  <!-- Wing left -->
  <ellipse cx="35" cy="50" rx="10" ry="15" fill="#5AB6E8" transform="rotate(-25 35 50)"/>
  <!-- Wing right -->
  <ellipse cx="65" cy="50" rx="10" ry="15" fill="#5AB6E8" transform="rotate(25 65 50)"/>
  <!-- Head -->
  <circle cx="50" cy="38" r="8" fill="#6BCDFF"/>
  <!-- Beak -->
  <path d="M50 40 L48 44 L52 44 Z" fill="#FFD93D"/>
  <!-- Eye -->
  <circle cx="47" cy="37" r="2" fill="#333"/>
  <circle cx="47.5" cy="36.5" r="0.8" fill="white"/>
  <!-- Legs -->
  <line x1="48" y1="70" x2="48" y2="78" stroke="#FFD93D" stroke-width="2"/>
  <line x1="52" y1="70" x2="52" y2="78" stroke="#FFD93D" stroke-width="2"/>
  <!-- Feet -->
  <path d="M45 78 L48 78 L48 80" fill="none" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M48 78 L51 78" stroke="#FFD93D" stroke-width="1.5"/>
  <path d="M49 78 L52 78 L52 80" fill="none" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52 78 L55 78" stroke="#FFD93D" stroke-width="1.5"/>
  <!-- Tail feathers -->
  <path d="M50 70 L48 80 L50 78 L52 80 Z" fill="#5AB6E8"/>
  <!-- Wing details -->
  <ellipse cx="35" cy="52" rx="3" ry="5" fill="#6BCDFF" opacity="0.6"/>
  <ellipse cx="65" cy="52" rx="3" ry="5" fill="#6BCDFF" opacity="0.6"/>
</svg>