<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="55" cy="60" rx="18" ry="12" fill="#FFB5A7"/>
  <!-- Head -->
  <circle cx="35" cy="48" r="12" fill="#FFB5A7"/>
  <!-- Ears (triangular) -->
  <path d="M28 38 L24 28 L32 35 Z" fill="#FF9688"/>
  <path d="M42 38 L46 28 L38 35 Z" fill="#FF9688"/>
  <!-- Eyes -->
  <circle cx="32" cy="46" r="2" fill="#333"/>
  <circle cx="38" cy="46" r="2" fill="#333"/>
  <!-- Nose -->
  <circle cx="35" cy="52" r="2" fill="#FF6B9D"/>
  <!-- Whiskers -->
  <line x1="20" y1="48" x2="28" y2="48" stroke="#666" stroke-width="1"/>
  <line x1="20" y1="50" x2="28" y2="50" stroke="#666" stroke-width="1"/>
  <line x1="42" y1="48" x2="50" y2="48" stroke="#666" stroke-width="1"/>
  <line x1="42" y1="50" x2="50" y2="50" stroke="#666" stroke-width="1"/>
  <!-- Legs -->
  <rect x="42" y="68" width="4" height="12" fill="#FFB5A7" rx="2"/>
  <rect x="50" y="68" width="4" height="12" fill="#FFB5A7" rx="2"/>
  <rect x="58" y="68" width="4" height="12" fill="#FFB5A7" rx="2"/>
  <rect x="66" y="68" width="4" height="12" fill="#FFB5A7" rx="2"/>
  <!-- Paws -->
  <ellipse cx="44" cy="80" rx="2.5" ry="1.5" fill="#FF9688"/>
  <ellipse cx="52" cy="80" rx="2.5" ry="1.5" fill="#FF9688"/>
  <ellipse cx="60" cy="80" rx="2.5" ry="1.5" fill="#FF9688"/>
  <ellipse cx="68" cy="80" rx="2.5" ry="1.5" fill="#FF9688"/>
  <!-- Tail (curved up) -->
  <path d="M73 58 Q78 50 75 42" fill="none" stroke="#FFB5A7" stroke-width="5" stroke-linecap="round"/>
  <!-- Stripes -->
  <path d="M35 55 Q40 58 45 60" fill="none" stroke="#FF9688" stroke-width="1.5" opacity="0.5"/>
</svg>